<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts Dashboard</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>

    <div class="container mt-4">
        <h2 class="font-weight-bold text-center mb-4 text-secondary">JSONPlaceholder Posts</h2>
        
        
        <div class="row justify-content-center mb-5">
            <div class="col-md-6 col-12">
                <div class="card p-4 shadow-sm border-0">
                    <form id="postform">
                        <div class="form-group mb-3">
                            <label class="font-weight-bold text-dark mb-1">Title *</label>
                            <input type="text" id="title" class="form-control" required placeholder="Enter Title">
                        </div>
                        <div class="form-group mb-3">
                            <label class="font-weight-bold text-dark mb-1">Body *</label>
                            <textarea id="body" class="form-control" rows="4" required placeholder="Enter Body"></textarea>
                        </div>
                        <div class="form-group mb-4">
                            <label class="font-weight-bold text-dark mb-1">userId *</label>
                            
                            <select id="userId" class="form-control" required>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                            </select>
                        </div>
                        
                        <button type="submit" id="addpost" class="btn btn-primary btn-block font-weight-bold py-2">Add Post</button>
                        <button type="button" id="updatepost" class="btn btn-warning btn-block font-weight-bold py-2 d-none">Update Post</button>
                    </form>
                </div>
            </div>
        </div>

        <hr class="mb-5">

        
        <div class="row" id="postcontainer"></div>
    </div>

    
    <div id="spinner" class="spinner-overlay d-none">
        <div class="spinner-border text-primary" role="status">
            <span class="sr-only">Loading...</span>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./assets/js/app.js"></script>
</body>
</html>
